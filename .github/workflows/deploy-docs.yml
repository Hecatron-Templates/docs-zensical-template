name: Documentation

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Pip Install
        working-directory: ./docs
        run: pip install -r ./virtenv/requirements.txt
      - name: Zensical Build
        working-directory: ./docs
        run: zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/
      - uses: actions/deploy-pages@v5
        id: deployment
